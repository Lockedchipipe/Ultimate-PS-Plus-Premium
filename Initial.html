<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Planner</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef3f8}
.container{max-width:900px;margin:40px auto;background:#fff;border-radius:12px;padding:24px;box-shadow:0 6px 18px rgba(0,0,0,.12)}
h1{margin-top:0}
.destination{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #ddd}
button{margin-top:20px;padding:10px 18px;border:none;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<h1>Travel Planner</h1>

<div class="destination"><span>Paris</span><span>3 Days</span></div>
<div class="destination"><span>Rome</span><span>2 Days</span></div>
<div class="destination"><span>Prague</span><span>4 Days</span></div>

<button onclick="calculateTrip()">Calculate Total</button>
<p id="result"></p>
</div>

<script>
function calculateTrip(){
    const totalDays=3+2+4;
    document.getElementById("result").textContent=`Total Trip Duration: ${totalDays} Days`;
}
</script>
</body>
</html>
